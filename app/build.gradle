plugins {
    id 'com.android.application'
}

android {
    namespace 'com.lynx.spoofer'
    compileSdk 36

    defaultConfig {
        applicationId "com.lynx.spoofer"
        minSdk 29
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug // remove when using real keystore
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}